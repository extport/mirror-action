name: Build and Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build dist and update tags
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - name: Build and commit dist
        uses: miguelcolmenares/npm-auto-build@8c22581033b30b631ff66f6c1b72fa3bdc2ea312 # v2.1.2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          node-version: '24'
          commit-message: 'build: compile dist for ${{ github.event.release.tag_name }}'
      - name: Update major version tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          MAJOR=$(echo "$TAG" | grep -oE '^v[0-9]+')
          if [ -n "$MAJOR" ]; then
            git tag -f "$MAJOR"
            git push origin "$MAJOR" --force
            echo "Updated $MAJOR → $TAG"
          fi
